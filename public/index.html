<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keshot Dashboard</title>
    <!-- Telegram Web App script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" id="dashboardView">
        <!-- Header -->
        <header class="header glass-panel">
            <div class="user-info">
                <div class="avatar" id="userAvatar">K</div>
                <div class="greeting">
                    <span class="greeting-text">Halo,</span>
                    <h1 class="user-name" id="userName">Pengguna</h1>
                </div>
            </div>
            <div class="theme-toggle" id="themeToggle">
                🎨
            </div>
        </header>

        <!-- Main Balance Card -->
        <section class="balance-card glass-panel highlight">
            <div class="balance-label">Total Saldo</div>
            <div class="balance-amount" id="totalBalance">Rp 0</div>
            
            <div class="stats-row">
                <div class="stat-item income">
                    <div class="stat-icon">⬇️</div>
                    <div class="stat-details">
                        <span class="stat-label">Pemasukan</span>
                        <span class="stat-value" id="totalIncome">Rp 0</span>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="stat-item expense">
                    <div class="stat-icon">⬆️</div>
                    <div class="stat-details">
                        <span class="stat-label">Pengeluaran</span>
                        <span class="stat-value" id="totalExpense">Rp 0</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="quick-actions">
            <button class="action-btn add-income" onclick="WebAppActions.triggerIncome()">
                <div class="icon">💼</div>
                <span>Catat<br>Pemasukan</span>
            </button>
            <button class="action-btn add-expense" onclick="WebAppActions.triggerExpense()">
                <div class="icon">🛒</div>
                <span>Catat<br>Pengeluaran</span>
            </button>
            <button class="action-btn view-history" onclick="WebAppActions.triggerHistory()">
                <div class="icon">📜</div>
                <span>Lihat<br>Histori</span>
            </button>
        </section>

        <!-- Recent Transactions Skeleton -->
        <section class="recent-transactions glass-panel">
            <div class="section-header">
                <h2>Aktivitas Terbaru</h2>
                <span class="view-all" onclick="WebAppActions.triggerHistory()" style="cursor: pointer;">Lihat Semua</span>
            </div>
            <div class="transaction-list" id="transactionList">
                <!-- Data will be populated by JS -->
                <div class="empty-state">
                    <p>Memuat data dari bot...</p>
                </div>
            </div>
        </section>

        <!-- Footer Button -->
        <button id="mainButton" class="tg-main-button">Tutup Dashboard</button>
    </div>

    <!-- History View -->
    <div class="app-container" id="historyView" style="display: none;">
        <!-- Header -->
        <header class="header glass-panel" style="justify-content: flex-start; gap: 16px;">
            <button class="back-btn" onclick="WebAppActions.switchView('dashboard')">◀</button>
            <h2 class="view-title" style="margin: 0; font-size: 18px;">Riwayat Transaksi</h2>
        </header>

        <!-- Month/Week Filter -->
        <section class="filter-section glass-panel">
            <div class="view-mode-selector">
                <button class="mode-btn active" id="btnModeMonth" onclick="WebAppActions.setHistoryMode('month')">Bulanan</button>
                <button class="mode-btn" id="btnModeWeek" onclick="WebAppActions.setHistoryMode('week')">Mingguan</button>
            </div>
            <div class="month-selector" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <button class="month-btn" id="prevDateBtn" onclick="WebAppActions.changeDate(-1)">◀</button>
                <div id="currentDateDisplay" style="font-weight: 600; font-size: 16px;">Bulan Ini</div>
                <button class="month-btn" id="nextDateBtn" onclick="WebAppActions.changeDate(1)" disabled style="opacity: 0.5;">▶</button>
            </div>
            
            <div class="stats-row">
                <div class="stat-item income">
                    <div class="stat-details">
                        <span class="stat-label">Pemasukan</span>
                        <span class="stat-value" id="historyIncome">Rp 0</span>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="stat-item expense">
                    <div class="stat-details">
                        <span class="stat-label">Pengeluaran</span>
                        <span class="stat-value" id="historyExpense">Rp 0</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- History List -->
        <section class="recent-transactions glass-panel" style="flex: 1; overflow-y: auto;">
            <div class="transaction-list" id="fullHistoryList">
                <div class="empty-state"><p>Memuat riwayat...</p></div>
            </div>
        </section>
    </div>

    <!-- Edit Transaction Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content glass-panel" id="editModalContent">
            <h3>Edit Transaksi</h3>
            <div class="form-group">
                <label>Tipe</label>
                <select id="editType" class="form-input">
                    <option value="expense">Pengeluaran</option>
                    <option value="income">Pemasukan</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nominal (Rp)</label>
                <input type="number" id="editAmount" class="form-input" min="0">
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <input type="text" id="editCategory" class="form-input" placeholder="Makan, Transport, dll">
            </div>
            <div class="form-group">
                <label>Catatan (Opsional)</label>
                <input type="text" id="editNote" class="form-input" placeholder="Rincian...">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="WebAppActions.closeEditModal()">Batal</button>
                <button class="btn-save" id="btnSaveEdit" onclick="WebAppActions.saveEdit()">Simpan</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
